services:
  postgres:
    image: postgres:16-alpine
    container_name: survey_pulse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: survey_pulse
      POSTGRES_PASSWORD: survey_pulse
      POSTGRES_DB: survey_pulse_dev
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U survey_pulse"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: survey_pulse_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: survey_pulse
      CLICKHOUSE_USER: survey_pulse
      CLICKHOUSE_PASSWORD: survey_pulse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./priv/clickhouse/init:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: survey_pulse_app
    restart: unless-stopped
    ports:
      - "4600:4600"
    environment:
      DATABASE_URL: "ecto://survey_pulse:survey_pulse@postgres:5432/survey_pulse_dev"
      CLICKHOUSE_URL: "http://survey_pulse:survey_pulse@clickhouse:8123/survey_pulse"
      PHX_HOST: localhost
      PORT: "4600"
      SECRET_KEY_BASE: "RhwdtKMHxEGME9QM7Z1Fqf6e4QZsNjq0L5V7MgK3yKbGt4uPAz1rQEsQfMN8J+x"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

volumes:
  pg_data:
  ch_data:
